spring:
  application:
    name: smart-campus-hub
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartcampus}
    username: ${DB_USER:yasiruvithana}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:localDevSecretKeyThatMustBeAtLeast256BitsLongForHS256AlgorithmSecurityRequirementsHere}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  upload-dir: ${UPLOAD_DIR:./uploads}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.2}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
