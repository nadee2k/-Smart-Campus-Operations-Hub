# Use environment variables for credentials so secrets are not stored in git.
# Local defaults are safe placeholders only.

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

server.port=8080

app.jwt.secret=${JWT_SECRET:localDevSecretKeyThatMustBeAtLeast256BitsLongForHS256AlgorithmSecurityRequirementsHere}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173
app.frontend-url=http://localhost:5173
app.upload-dir=./uploads
